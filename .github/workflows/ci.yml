name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-groups
      - run: uv run python -m coverage run -m pytest -q
      - run: uv run python -m coverage report
      - run: uv run python scripts/validate_docs_frontmatter.py docs/
