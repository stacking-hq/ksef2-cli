name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-groups
      - run: uv run python -m coverage run -m pytest -q
      - run: uv run python -m coverage report
      - run: uv run python scripts/validate_docs_frontmatter.py docs/

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ksef2-cli
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-groups
      - name: Check tag matches package version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          if tag != f"v{version}":
              raise SystemExit(f"Tag {tag!r} does not match package version {version!r}")
          PY
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1

  notify-docs:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch docs deployment
        env:
          DOCS_DISPATCH_TOKEN: ${{ secrets.DOCS_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DOCS_DISPATCH_TOKEN" ]; then
            echo "::notice::DOCS_DISPATCH_TOKEN is not configured; skipping docs deployment dispatch."
            exit 0
          fi

          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DOCS_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/stacking-hq/ksef2-docs/dispatches \
            -d "$(python - <<'PY'
          import json
          import os

          print(json.dumps({
              "event_type": "docs-updated",
              "client_payload": {
                  "product": "cli",
                  "ref": os.environ["GITHUB_REF_NAME"],
                  "repository": os.environ["GITHUB_REPOSITORY"],
                  "sha": os.environ["GITHUB_SHA"],
              },
          }))
          PY
          )"
